name: NHL GameDayTweets Line Alerts

on:
  schedule:
    # GitHub Actions scheduled workflows use cron.
    # This runs every 5 minutes.
    - cron: "*/5 * * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "check"
        type: choice
        options:
          - check
          - test-slack
          - scrape-only

      send_backfill_on_first_run:
        description: "Send current existing posts if seen file is empty? Usually keep false."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: nhl-line-alerts
  cancel-in-progress: false

jobs:
  run-line-alert-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure storage files exist
        run: |
          if [ ! -f seen_gameday_line_status_ids.json ]; then
            echo "[]" > seen_gameday_line_status_ids.json
          fi

          if [ ! -f gameday_line_alert_log.csv ]; then
            echo "alert_sent_at,status_id,source_handle,tweet_date_text,tweet_url,best_text_source,best_text_is_truncated,is_probably_image_based,best_text" > gameday_line_alert_log.csv
          fi

      - name: Run NHL line alert bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MAX_NEW_ALERTS_PER_RUN: "15"
          REQUEST_SLEEP_SECONDS: "0.75"
        run: |
          MODE="${{ github.event.inputs.mode || 'check' }}"
          SEND_BACKFILL="${{ github.event.inputs.send_backfill_on_first_run || 'false' }}"

          echo "Mode: $MODE"
          echo "Send backfill on first run: $SEND_BACKFILL"

          python gameday_lines_alert.py \
            --mode "$MODE" \
            --send-backfill-on-first-run "$SEND_BACKFILL"

      - name: Commit updated seen IDs and alert log
        if: github.event.inputs.mode != 'scrape-only'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add seen_gameday_line_status_ids.json gameday_line_alert_log.csv

          if git diff --cached --quiet; then
            echo "No storage changes to commit."
          else
            git commit -m "Update NHL line alert state [skip ci]"
            git push
          fi
